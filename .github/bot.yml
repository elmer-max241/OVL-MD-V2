name: OVL-MD Bot CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 */5 * * *' # Relance le bot automatiquement toutes les 5 heures

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          npm install
          
      - name: Start OVL-MD Bot
        # Exécute le bot pendant un peu plus de 5 heures (18300 secondes) avant que l'action suivante ne prenne le relais
        run: timeout 18300s node Ovl.js || true